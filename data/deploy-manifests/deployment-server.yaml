apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - image: techcs.kr-central-2.kcr.dev/cr-lucas-tutorial/kakaocloud-library-server:faf9c39b1746c39699ef5e64eadda22cbce56b3b
          name: kakaocloud-library-server
          ports:
            - containerPort: 8080
          env:
            - name: PROFILE
              value: "local"
            - name: SERVER_PORT
              value: "8080"
      imagePullSecrets:
        - name: kc-tutorial-cr
