apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - image: techcs.kr-central-2.kcr.dev/cr-lucas-tutorial/kakaocloud-library-client:faf9c39b1746c39699ef5e64eadda22cbce56b3b
          name: kakaocloud-library-client
          ports:
            - containerPort: 80
          env:
            - name: SERVER_ENDPOINT
              value: "http://server.kakaocloud-library.svc.cluster.local:8080"
      imagePullSecrets:
        - name: kc-tutorial-cr
